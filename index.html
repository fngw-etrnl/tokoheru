<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toko Mas Heru</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

  <style>
    @media print {
      /* Setup Kertas Thermal 58mm */
      @page {
        size: 58mm auto;
        margin: 0;
      }

      body {
        margin: 0;
        padding: 0;
        background: white;
      }

      /* Sembunyikan semua elemen UI kecuali struk */
      #root, .no-print {
        display: none !important;
      }

      /* Container Struk Khusus Print */
      #print-invoice {
        display: block !important;
        width: 58mm;
        padding: 2mm;
        font-family: 'Courier New', Courier, monospace;
        font-size: 9pt;
        line-height: 1.2;
        color: black;
      }
    }

    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    .material-symbols-outlined {
      vertical-align: middle;
      font-size: inherit;
    }
  </style>
  
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Toko Mas Heru">
  <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3081/3081648.png">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3081/3081648.png">
  <meta name="theme-color" content="#4f46e5">
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz-Um422Lqpxfi1OzEz6v9ahpu_T12lfT5jKqG6miqJ3FFAqfpOwUzfrTFaVYAPypvi/exec";

    const formatRp = (number) => {
      return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
    };

    const showAlert = (options) => {
      if (window.Swal) {
        window.Swal.fire({ fontFamily: 'sans-serif', ...options });
      } else {
        alert(options.title + (options.text ? `\n${options.text}` : ''));
      }
    };

    const Icon = ({ name, className = "" }) => (
      <span className={`material-symbols-outlined ${className}`}>{name}</span>
    );

    function App() {
      const [userRole, setUserRole] = useState(null);
      const [cashierId, setCashierId] = useState('');
      const [loading, setLoading] = useState(true);
      const [products, setProducts] = useState([]);
      const [categories, setCategories] = useState([]);
      const [transactions, setTransactions] = useState([]);
      const [balances, setBalances] = useState({ kembalian: 0, pulsa: 0, bank: 0 });
      const [storeConfig, setStoreConfig] = useState({ name: 'Toko Mas Heru', address: '', phone: '', footer: '' });

      const syncToGoogleSheets = async (action, data) => {
        try {
          await fetch(APP_SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ action, data, timestamp: new Date().toISOString() })
          });
        } catch (error) { console.error("Sync error:", error); }
      };

      useEffect(() => {
        const loadData = async () => {
          try {
            const res = await fetch(APP_SCRIPT_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify({ action: 'GET_INITIAL_DATA' })
            });
            const result = await res.json();
            if (result.status === 'success') {
              setProducts(result.data.products || []);
              setCategories(result.data.categories || []);
              setTransactions(result.data.transactions || []);
              if (result.data.balances) setBalances(result.data.balances);
              if (result.data.storeConfig) setStoreConfig(result.data.storeConfig);
            }
          } catch (e) { console.error(e); } finally { setLoading(false); }
        };
        loadData();
      }, []);

      if (loading) return (
        <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white font-bold tracking-widest">
          <div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
          MEMUAT DATA ...
        </div>
      );

      if (!userRole) return <LoginScreen onLogin={(role, code) => { setUserRole(role); setCashierId(code); }} />;

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-800">
          {userRole === 'kasir' && (
            <KasirDashboard 
              products={products} categories={categories} storeConfig={storeConfig} 
              cashierId={cashierId} transactions={transactions}
              onLogout={() => { setUserRole(null); setCashierId(''); }}
              onTransactionSuccess={(trx) => {
                const finalTrx = { ...trx, cashierId: cashierId };
                
                // 1. Masuk ke Transactions dulu
                setTransactions(prev => [finalTrx, ...prev]);
                syncToGoogleSheets('ADD_TRANSACTION', finalTrx);

                // 2. Hitung Saldo
                setBalances(prev => {
                  const nb = { ...prev };
                  if (finalTrx.method === 'Cash') nb.kembalian += finalTrx.total;
                  else if (finalTrx.method === 'EDC BRILink') nb.bank += finalTrx.total;

                  finalTrx.items.forEach(item => {
                    // LOGIKA TARIK TUNAI: Laci Berkurang
                    if (item.category === 'Tarik Tunai') {
                      nb.kembalian -= (item.price * item.qty);
                    } else if (item.category === 'Pulsa' || item.category === 'Paket Data') {
                      nb.pulsa -= (item.price * item.qty);
                    } else if (item.category === 'Transfer') {
                      nb.bank -= (item.price * item.qty);
                    }
                  });
                  syncToGoogleSheets('UPDATE_BALANCES', nb);
                  return nb;
                });
              }}
            />
          )}

          {userRole === 'admin' && (
            <AdminDashboard 
              products={products} setProducts={setProducts} categories={categories} setCategories={setCategories}
              transactions={transactions} balances={balances} setBalances={setBalances}
              storeConfig={storeConfig} setStoreConfig={setStoreConfig} onLogout={() => setUserRole(null)}
              syncToSheets={syncToGoogleSheets}
            />
          )}
        </div>
      );

    function LoginScreen({ onLogin }) {
      const [role, setRole] = useState('kasir');
      const [pin, setPin] = useState('');
      const [cashierCode, setCashierCode] = useState('');

      const handleLogin = async (e) => {
        e.preventDefault();
        if (role === 'admin') {
          if (pin === '1234') onLogin('admin', 'ADMIN');
          else showAlert({ icon: 'error', title: 'PIN Salah' })          
          return;
        }

        if (!cashierCode.trim() || !pin.trim()) {
          showAlert({ icon: 'warning', title: 'Perhatian', text: 'Isi Kode Kasir dan PIN!' });
          return;
        }

        try {
          showAlert({ title: 'Memverifikasi...', allowOutsideClick: false, didOpen: () => { window.Swal.showLoading(); } });

          const response = await fetch(APP_SCRIPT_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify({ 
              action: 'CHECK_LOGIN', 
              data: { 
                cashierCode: cashierCode.trim().toUpperCase(),
                pin: pin.trim() // PIN sekarang dikirim untuk dicek
              } 
            })
          });
          
          const result = await response.json();

          if (result && result.valid) {
            window.Swal.close();
            // Login sukses!
            onLogin('kasir', cashierCode.toUpperCase());
          } else {
            showAlert({ 
              icon: 'error', 
              title: 'Login Gagal', 
              text: result.message || 'Kode Kasir atau PIN salah / akun nonaktif!' 
            });
          }
          catch (err) {
          console.error("Login Error:", err);
          showAlert({ icon: 'error', title: 'Error', text: 'Koneksi database bermasalah.' });
          }
          };

      return (
        <div className="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-500 to-purple-600 p-4">
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
            <div className="text-center mb-8">
              <div className="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <Icon name="storefront" className="text-indigo-600 text-3xl" />
              </div>
              <h1 className="text-2xl font-bold text-gray-800">Toko Mas Heru</h1>
              <p className="text-gray-500 text-sm mt-1">Silakan masuk untuk melanjutkan</p>
            </div>

            <form onSubmit={handleLogin} className="space-y-6">
              <div className="flex gap-4">
                <button type="button" onClick={() => setRole('kasir')} className={`flex-1 py-3 rounded-xl font-medium transition-all ${role === 'kasir' ? 'bg-indigo-600 text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>Mode Kasir</button>
                <button type="button" onClick={() => setRole('admin')} className={`flex-1 py-3 rounded-xl font-medium transition-all ${role === 'admin' ? 'bg-indigo-600 text-white shadow-md' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>Mode Admin</button>
              </div>

              {role === 'kasir' && (
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-2">Kode Kasir: <span className="text-xs text-gray-400 font-normal">(sesuai cabang)</span></label>
                  <input type="text" value={cashierCode} onChange={(e) => setCashierCode(e.target.value)} placeholder="••••" className="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all text-center text-xl uppercase tracking-wider" required />
                </div>
              )}

              <div>
                <label className="block text-sm font-medium text-gray-700 mb-2">Kode PIN <span className="text-xs text-gray-400 font-normal">:</span></label>
                <input type="password" value={pin} onChange={(e) => setPin(e.target.value)} placeholder="••••" className="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all text-center text-2xl tracking-[0.5em]" required />
              </div>
              <button type="submit" className="w-full bg-green-600 hover:bg-green-700 text-white py-3 rounded-xl font-bold shadow-lg shadow-green-200 transition-all active:scale-95">MASUK</button>
            </form>
          </div>
        </div>
      );
    }    
    
    function KasirDashboard({ products, categories, storeConfig, cashierId, transactions, onLogout, onTransactionSuccess }) {
      const [cart, setCart] = useState([]);
      const [searchQuery, setSearchQuery] = useState('');
      const [activeCategory, setActiveCategory] = useState('Semua');
      const [paymentAmount, setPaymentAmount] = useState('');
      const [paymentMethod, setPaymentMethod] = useState('Cash');
      const [refNumber, setRefNumber] = useState('');
      const [showPayment, setShowPayment] = useState(false);
      const [lastInvoice, setLastInvoice] = useState(null);
      const [showHistory, setShowHistory] = useState(false);
      const [isMobileCartOpen, setIsMobileCartOpen] = useState(false);

      const filteredProducts = products.filter(p => (activeCategory === 'Semua' || p.category === activeCategory) && p.name.toLowerCase().includes(searchQuery.toLowerCase()));
      const totalBelanja = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);

      const processPayment = () => {
        const bayar = parseInt(paymentAmount.replace(/\D/g, '')) || 0;
        if (bayar < totalBelanja) return showAlert({ icon: 'error', title: 'Uang Kurang' });

        const data = {
          id: `INV-${Date.now().toString().slice(-6)}`,
          date: new Date().toISOString(),
          cashierId,
          items: cart,
          total: totalBelanja,
          payment: bayar,
          change: bayar - totalBelanja,
          method: paymentMethod,
          ref: refNumber
        };

        setLastInvoice(data);
        onTransactionSuccess(data);
        setCart([]);
        setShowPayment(false);
        setIsMobileCartOpen(false);
        setRefNumber('');
        setTimeout(() => window.print(), 500);
      };

      return (
        <div className="flex h-screen overflow-hidden bg-gray-100 relative">
          {/* Main POS Content */}
          <div className="flex-1 flex flex-col h-full overflow-hidden no-print">
            <div className="bg-white px-4 md:px-6 py-4 shadow-sm flex items-center justify-between z-10">
              <div>
                <h2 className="text-xl font-bold text-gray-800">{storeConfig.name}</h2>
                <p className="text-xs text-gray-500">Kasir: {cashierId}</p>
              </div>
              <div className="flex items-center gap-2">
                 <button onClick={() => setShowHistory(!showHistory)} className="p-2 text-indigo-600 bg-indigo-50 rounded-lg md:hidden"><Icon name="history" /></button>
                 <button onClick={onLogout} className="p-2 text-red-600 bg-red-50 rounded-lg"><Icon name="logout" /></button>
              </div>
            </div>

            <div className="p-4 no-print">
              <div className="relative mb-4">
                <Icon name="search" className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400" />
                <input type="text" placeholder="Cari barang..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} className="w-full pl-10 pr-4 py-2 rounded-xl border focus:ring-2 focus:ring-indigo-500 outline-none" />
              </div>
              <div className="flex gap-2 overflow-x-auto hide-scrollbar pb-2">
                <button onClick={()=>setActiveCategory('Semua')} className={`px-4 py-1 rounded-full whitespace-nowrap font-medium ${activeCategory === 'Semua' ? 'bg-indigo-600 text-white' : 'bg-white border'}`}>Semua</button>
                {categories.map(c => <button key={c.id} onClick={()=>setActiveCategory(c.name)} className={`px-4 py-1 rounded-full whitespace-nowrap font-medium ${activeCategory === c.name ? 'bg-indigo-600 text-white' : 'bg-white border'}`}>{c.name}</button>)}
              </div>
            </div>

            <div className="flex-1 overflow-y-auto px-4 pb-24 grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
              {filteredProducts.map(p => (
                <div key={p.id} onClick={() => setCart(prev => {
                  const ex = prev.find(i => i.id === p.id);
                  if (ex) return prev.map(i => i.id === p.id ? {...i, qty: i.qty+1} : i);
                  return [...prev, {...p, qty: 1}];
                })} className="bg-white p-4 rounded-2xl shadow-sm border border-transparent hover:border-indigo-300 active:scale-95 transition-all">
                  <div className="h-20 bg-gray-50 rounded-xl mb-2 flex items-center justify-center"><Icon name="inventory_2" className="text-gray-300 text-3xl" /></div>
                  <h3 className="text-sm font-bold text-gray-800 line-clamp-1">{p.name}</h3>
                  <p className="text-indigo-600 font-bold">{formatRp(p.price)}</p>
                </div>
              ))}
            </div>
          </div>

          {/* Menu Riwayat Transaksi Dropdown */}
                <div className="relative">
                  <button onClick={() => setShowHistory(!showHistory)} className="flex items-center gap-2 px-3 py-2 text-indigo-600 hover:bg-indigo-50 rounded-lg transition-colors">
                    <Icon name="history" className="text-lg" /> <span className="hidden md:inline">Riwayat</span>
                  </button>
                  {showHistory && (
                    <div className="absolute right-0 mt-2 w-72 bg-white rounded-xl shadow-xl border border-gray-100 z-50 overflow-hidden">
                      <div className="p-3 border-b border-gray-100 bg-gray-50 font-bold text-gray-700 flex justify-between items-center">
                        <span>Riwayat Terakhir</span>
                        <button onClick={() => setShowHistory(false)} className="text-gray-400 hover:text-gray-600"><Icon name="close" className="text-base" /></button>
                      </div>
                      <div className="max-h-64 overflow-y-auto">
                        {transactions.length === 0 ? (
                           <div className="p-4 text-center text-gray-500 text-sm">Belum ada transaksi</div>
                        ) : (
                           transactions.slice(0, 10).map(trx => (
                             <div key={trx.id} className="p-3 border-b border-gray-50 hover:bg-gray-50 text-sm">
                               <div className="flex justify-between items-start mb-1">
                                 <span className="font-bold text-gray-800">{trx.id}</span>
                                 <span className="text-xs text-gray-500 bg-gray-100 px-2 py-0.5 rounded">{trx.cashierId || '-'}</span>
                               </div>
                               <div className="text-xs text-gray-500 mb-1">{new Date(trx.date).toLocaleString('id-ID')}</div>
                               <div className="text-indigo-600 font-bold">{formatRp(trx.total)}</div>
                             </div>
                           ))
                        )}
                      </div>
                    </div>
                  )}
                </div>

                <button onClick={onLogout} className="flex items-center gap-2 px-3 py-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors">
                  <Icon name="logout" className="text-lg" /> <span className="hidden md:inline">Keluar</span>
                </button>
              </div>
            </div>

          {/* Banner Kasir */}
            <div className="px-4 md:px-6 pt-4 shrink-0 no-print">
              <div className="w-full h-28 bg-indigo-100 rounded-2xl overflow-hidden relative shadow-sm">
                 <img src="https://images.unsplash.com/photo-1556740738-b6a63e27c4df?auto=format&fit=crop&w=1200&q=80" alt="Promo Banner" className="w-full h-full object-cover opacity-80" />
                 <div className="absolute inset-0 bg-gradient-to-r from-indigo-900/90 to-transparent flex items-center p-6">
                   <div className="text-white">
                     <h3 className="text-xl font-bold mb-1">Selamat Datang, Kasir {cashierId || 'Pagi'}!</h3>
                     <p className="text-sm opacity-90">Tetap semangat melayani pelanggan hari ini.</p>
                   </div>
                 </div>
              </div>
            </div>

          {/* Desktop Sidebar / Mobile Floating Button */}
          <div className={`md:flex md:w-[350px] bg-white border-l flex-col no-print ${isMobileCartOpen ? 'fixed inset-0 z-50 flex' : 'hidden'}`}>
            <div className="p-4 border-b flex justify-between items-center bg-gray-50 md:bg-white">
              <h2 className="font-bold text-lg flex items-center gap-2"><Icon name="shopping_cart" className="text-indigo-600" /> Pesanan</h2>
              <button onClick={()=>setIsMobileCartOpen(false)} className="md:hidden"><Icon name="close" /></button>
            </div>
            <div className="flex-1 overflow-y-auto p-4 space-y-3">
              {cart.map(i => (
                <div key={i.id} className="flex justify-between items-center p-3 bg-gray-50 rounded-xl">
                  <div className="flex-1 mr-2"><h4 className="font-bold text-sm line-clamp-1">{i.name}</h4><p className="text-xs text-indigo-600">{formatRp(i.price)}</p></div>
                  <div className="flex items-center gap-2 bg-white rounded-lg p-1">
                    <button onClick={()=>setCart(prev => prev.map(item => item.id===i.id ? {...item, qty: Math.max(1, item.qty-1)} : item))} className="w-6 h-6 flex items-center justify-center">-</button>
                    <span className="w-4 text-center font-bold text-xs">{i.qty}</span>
                    <button onClick={()=>setCart(prev => prev.map(item => item.id===i.id ? {...item, qty: item.qty+1} : item))} className="w-6 h-6 flex items-center justify-center">+</button>
                  </div>
                  <button onClick={()=>setCart(prev => prev.filter(item => item.id!==i.id))} className="ml-2 text-red-400"><Icon name="delete" className="text-sm" /></button>
                </div>
              ))}
            </div>
            <div className="p-4 border-t bg-gray-50">
              <div className="flex justify-between font-bold text-xl mb-4"><span>Total</span><span>{formatRp(totalBelanja)}</span></div>
              <button onClick={()=>setShowPayment(true)} disabled={cart.length===0} className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg disabled:bg-gray-300">BAYAR SEKARANG</button>
            </div>
          </div>

          {!isMobileCartOpen && (
            <button onClick={()=>setIsMobileCartOpen(true)} className="md:hidden fixed bottom-6 right-6 w-16 h-16 bg-indigo-600 text-white rounded-full shadow-2xl flex items-center justify-center z-40">
              <Icon name="shopping_cart" />
              {cart.length > 0 && <span className="absolute -top-1 -right-1 bg-red-500 text-[10px] w-6 h-6 flex items-center justify-center rounded-full border-2 border-white">{cart.length}</span>}
            </button>
          )}

          {/* Modal Pembayaran */}
          {showPayment && (
            <div className="fixed inset-0 bg-white z-[60] flex flex-col">
              <div className="p-4 border-b flex items-center justify-between">
                <button onClick={()=>setShowPayment(false)} className="flex items-center gap-1 font-medium"><Icon name="arrow_back" /> Kembali</button>
                <h2 className="font-bold">Proses Pembayaran</h2>
                <div className="w-10"></div>
              </div>
              <div className="flex-1 overflow-y-auto p-6 flex flex-col items-center justify-center">
                <div className="text-center mb-8"><p className="text-gray-500 font-medium mb-1">Total Tagihan</p><h3 className="text-4xl font-bold text-indigo-600">{formatRp(totalBelanja)}</h3></div>
                
                <div className="w-full max-w-sm space-y-6">
                  <div>
                    <label className="block text-sm font-bold mb-2">Metode Pembayaran</label>
                    <div className="grid grid-cols-2 gap-2">
                      {['Cash', 'E-Wallet', 'Transfer', 'EDC BRILink'].map(m => (
                        <button key={m} onClick={()=>setPaymentMethod(m)} className={`py-3 rounded-xl font-bold transition-all ${paymentMethod===m ? 'bg-indigo-600 text-white shadow-md' : 'bg-gray-100 text-gray-600'}`}>{m}</button>
                      ))}
                    </div>
                  </div>

                  {paymentMethod === 'EDC BRILink' && (
                    <div className="animate-fade-in">
                      <label className="block text-sm font-bold mb-2">No. Referensi EDC</label>
                      <input type="text" value={refNumber} onChange={e=>setRefNumber(e.target.value)} placeholder="Contoh: 123456" className="w-full p-4 border rounded-xl bg-yellow-50 font-mono text-center outline-none focus:ring-2 focus:ring-yellow-400" />
                    </div>
                  )}

                  <div>
                    <label className="block text-sm font-bold mb-2">Uang Diterima</label>
                    <input type="text" className="w-full p-4 border rounded-xl text-3xl font-bold text-center focus:ring-2 focus:ring-indigo-500 outline-none" value={paymentAmount} onChange={e=>setPaymentAmount(e.target.value.replace(/\D/g,'') ? new Intl.NumberFormat('id-ID').format(e.target.value.replace(/\D/g,'')) : '')} autoFocus />
                    <div className="grid grid-cols-3 gap-2 mt-4">
                      {[50000, 100000, totalBelanja].map((amt, idx) => (
                        <button key={idx} onClick={()=>setPaymentAmount(new Intl.NumberFormat('id-ID').format(amt))} className="py-2 bg-indigo-50 text-indigo-600 rounded-lg text-xs font-bold">
                          {amt === totalBelanja ? 'Uang Pas' : formatRp(amt)}
                        </button>
                      ))}
                    </div>
                  </div>

                  <button onClick={processPayment} className="w-full bg-green-500 text-white py-5 rounded-2xl font-bold text-lg shadow-xl hover:bg-green-600 transition-all">CETAK STRUK</button>
                </div>
              </div>
            </div>
          )}

          {/* STRUK PRINT (Hanya Muncul saat Print) */}
          {lastInvoice && (
            <div id="print-invoice" className="hidden">
              <div style={{textAlign: 'center', marginBottom: '5mm'}}>
                <h2 style={{margin: '0 0 1mm 0', fontSize: '12pt'}}>{storeConfig.name.toUpperCase()}</h2>
                <p style={{margin: 0}}>{storeConfig.address}</p>
                <p style={{margin: 0}}>{storeConfig.phone}</p>
              </div>
              
              <div style={{display: 'flex', justifyContent: 'space-between', marginBottom: '2mm'}}>
                <span>ID: {lastInvoice.id}</span>
                <span>{new Date(lastInvoice.date).toLocaleDateString('id-ID')}</span>
              </div>
              <div style={{marginBottom: '3mm'}}>Kasir: {lastInvoice.cashierId}</div>

              <div style={{borderBottom: '1px dashed #000', marginBottom: '2mm'}}></div>
              <table style={{width: '100%', marginBottom: '2mm'}}>
                <tbody>
                  {lastInvoice.items.map((i, idx) => (
                    <tr key={idx}>
                      <td style={{padding: '1mm 0'}}>{i.name} x{i.qty}</td>
                      <td align="right">{formatRp(i.price * i.qty)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
              <div style={{borderBottom: '1px dashed #000', marginBottom: '2mm'}}></div>

              <div style={{display: 'flex', justifyContent: 'space-between', fontWeight: 'bold', fontSize: '10pt'}}>
                <span>TOTAL</span>
                <span>{formatRp(lastInvoice.total)}</span>
              </div>
              <div style={{display: 'flex', justifyContent: 'space-between', marginTop: '1mm'}}>
                <span>BAYAR ({lastInvoice.method})</span>
                <span>{formatRp(parseInt(lastInvoice.payment))}</span>
              </div>
              <div style={{display: 'flex', justifyContent: 'space-between'}}>
                <span>KEMBALI</span>
                <span>{formatRp(lastInvoice.change)}</span>
              </div>
              
              {lastInvoice.ref && <div style={{marginTop: '2mm'}}>Ref EDC: {lastInvoice.ref}</div>}

              <div style={{textAlign: 'center', marginTop: '5mm', fontSize: '8pt'}}>
                <p style={{margin: 0}}>{storeConfig.footer}</p>
                <p style={{marginTop: '2mm'}}>--- TERIMA KASIH ---</p>
              </div>
            </div>
          )}
        </div>
      );
    }

    function AdminDashboard({ products, setProducts, categories, transactions, balances, setBalances, storeConfig, setStoreConfig, onLogout, syncToSheets }) {
      // (Konten AdminDashboard dipertahankan aslinya agar interface tidak berubah)
      return (
        <div className="flex flex-col md:flex-row h-screen">
           <div className="p-8"><h1 className="text-2xl font-bold">Admin Dashboard</h1><p>Mode admin aktif. Silakan kelola toko.</p><button onClick={onLogout} className="mt-4 bg-red-500 text-white px-4 py-2 rounded">Logout</button></div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
